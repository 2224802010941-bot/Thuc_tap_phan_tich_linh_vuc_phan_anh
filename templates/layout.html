<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Tiếp Nhận Phản Ánh Công Dân</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="sticky top-0 z-40 bg-blue-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-white/15 backdrop-blur flex items-center justify-center text-base">🏛️</div>
                <div class="font-bold text-lg leading-tight">CỔNG DỊCH VỤ CÔNG AI</div>
            </div>

            <div class="flex items-center gap-1 md:gap-2">
                {# Active theo request.path; kiểu tab/pill nổi bật #}
                <a href="/submit"
                   class="whitespace-nowrap px-3 py-2 rounded-xl text-sm font-semibold transition 
                   {% if request.path == '/submit' %}bg-white/15 ring-1 ring-white/40 text-white
                   {% else %}text-white/95 hover:bg-white/10 hover:text-white{% endif %}">
                    <span class="inline-flex items-center gap-2">
                        <span class="text-base">📝</span> Gửi Phản Ánh
                    </span>
                </a>

                <a href="{{ url_for('page_tiep_nhan') }}"
                   class="whitespace-nowrap px-3 py-2 rounded-xl text-sm font-semibold transition 
                   {% if request.path == url_for('page_tiep_nhan') %}bg-white/15 ring-1 ring-white/40 text-white
                   {% else %}text-white/95 hover:bg-white/10 hover:text-white{% endif %}">
                    <span class="inline-flex items-center gap-2">
                        <span class="text-base">📥</span> Tiếp nhận hồ sơ
                    </span>
                </a>

                <a href="/monitor"
                   class="whitespace-nowrap px-3 py-2 rounded-xl text-sm font-semibold transition 
                   {% if request.path == '/monitor' %}bg-white/15 ring-1 ring-white/40 text-white
                   {% else %}text-white/95 hover:bg-white/10 hover:text-white{% endif %}">
                    <span class="inline-flex items-center gap-2">
                        <span class="text-base">📺</span> Tra Cứu
                    </span>
                </a>

                <a href="{{ url_for('page_dashboard') }}"
                   class="whitespace-nowrap px-3 py-2 rounded-xl text-sm font-semibold transition 
                   {% if request.path == url_for('page_dashboard') %}bg-white/15 ring-1 ring-white/40 text-white
                   {% else %}text-white/95 hover:bg-white/10 hover:text-white{% endif %}">
                    <span class="inline-flex items-center gap-2">
                        <span class="text-base">📊</span> Thống Kê
                    </span>
                </a>
<!-- 
                <a href="/maps"
                   class="whitespace-nowrap px-3 py-2 rounded-xl text-sm font-semibold transition 
                   {% if request.path == '/maps' %}bg-white/15 ring-1 ring-white/40 text-white
                   {% else %}text-white/95 hover:bg-white/10 hover:text-white{% endif %}">
                    <span class="inline-flex items-center gap-2">
                        <span class="text-base">🗺️</span> Bản đồ
                    </span>
                </a> -->

                <a href="/admin"
                   class="whitespace-nowrap px-3 py-2 rounded-xl text-sm font-semibold transition 
                   {% if request.path == '/admin' %}bg-white/15 ring-1 ring-white/40 text-white
                   {% else %}text-white/95 hover:bg-white/10 hover:text-white{% endif %}">
                    <span class="inline-flex items-center gap-2">
                        <span class="text-base">🛡️</span> Trang Quản Trị
                    </span>
                </a>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
